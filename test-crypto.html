<!DOCTYPE html>
<html>
<head>
    <title>Test Web Crypto API</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        pre { background: #0a0a0a; padding: 10px; border-left: 3px solid #0f0; }
        .ok { color: #0f0; } .error { color: #f00; }
    </style>
</head>
<body>
    <h1>Test Web Crypto API</h1>
    <div id="output"></div>

    <script>
        const out = document.getElementById('output');
        
        function log(msg, isError = false) {
            const pre = document.createElement('pre');
            pre.className = isError ? 'error' : 'ok';
            pre.textContent = msg;
            out.appendChild(pre);
        }

        log('=== Kiểm tra Web Crypto API ===');
        
        // Check 1: window.crypto
        if (window.crypto) {
            log('✓ window.crypto: ĐỊNH NGHĨA');
        } else {
            log('✗ window.crypto: UNDEFINED', true);
        }

        // Check 2: window.crypto.subtle
        if (window.crypto && window.crypto.subtle) {
            log('✓ window.crypto.subtle: ĐỊNH NGHĨA');
        } else {
            log('✗ window.crypto.subtle: UNDEFINED', true);
        }

        // Check 3: SubtleCrypto.generateKey
        if (window.crypto && window.crypto.subtle && typeof window.crypto.subtle.generateKey === 'function') {
            log('✓ crypto.subtle.generateKey: FUNCTION');
        } else {
            log('✗ crypto.subtle.generateKey: NOT FUNCTION', true);
        }

        // Check 4: Giao thức (http/https)
        log(`✓ Protocol: ${window.location.protocol}`);

        // Check 5: Hostname
        log(`✓ Hostname: ${window.location.hostname}`);

        // Check 6: Pathname
        log(`✓ Pathname: ${window.location.pathname}`);

        // Test 7: Thử generateKey
        if (window.crypto && window.crypto.subtle) {
            log('Thử tạo RSA key...');
            window.crypto.subtle.generateKey(
                {
                    name: 'RSASSA-PKCS1-v1_5',
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: 'SHA-256'
                },
                true,
                ['sign', 'verify']
            ).then(() => {
                log('✓ RSA key generation: THÀNH CÔNG');
            }).catch(err => {
                log(`✗ RSA key generation ERROR: ${err.message}`, true);
            });
        } else {
            log('✗ Không thể test RSA (crypto.subtle undefined)', true);
        }
    </script>
</body>
</html>
