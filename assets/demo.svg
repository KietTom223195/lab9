<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#0a1b3d"/>
      <stop offset="1" stop-color="#102a3f"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <rect x="40" y="60" width="360" height="260" rx="12" fill="#072029" stroke="#00ff88" stroke-opacity="0.12"/>
  <rect x="420" y="60" width="360" height="260" rx="12" fill="#072029" stroke="#00ff88" stroke-opacity="0.12"/>
  <rect x="800" y="60" width="360" height="260" rx="12" fill="#072029" stroke="#00ff88" stroke-opacity="0.12"/>
  <g font-family="Orbitron, sans-serif" fill="#00ff88">
    <text x="60" y="40" font-size="28" font-weight="700">RSA LAB NASA — Demo</text>
    <text x="60" y="110" font-size="22">Tạo Khóa RSA</text>
    <text x="440" y="110" font-size="22">Ký Thông Điệp</text>
    <text x="820" y="110" font-size="22">Xác Minh Chữ Ký</text>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#80ffff" font-size="14">
    <text x="60" y="170">$ Nhấn "Tạo Cặp Khóa" để bắt đầu...</text>
    <text x="440" y="170">$ Tạo khóa trước...</text>
    <text x="820" y="170">$ Ký thông điệp trước...</text>
  </g>
</svg>
